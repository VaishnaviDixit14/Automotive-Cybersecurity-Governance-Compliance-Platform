<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian &mdash; Automotive Cybersecurity Governance Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1220;
  --panel:#111B2E;
  --panel-2:#16223A;
  --border:#233252;
  --border-soft:#1B2A45;
  --text:#E7ECF3;
  --muted:#8CA0BE;
  --muted-2:#5E7092;
  --cyan:#31D8C4;
  --cyan-dim:#1B4A47;
  --amber:#EAAE3F;
  --amber-dim:#4A3A18;
  --red:#EA6363;
  --red-dim:#4A2020;
  --green:#4FD290;
  --green-dim:#1B4433;
  --blue:#5B92F0;
  --radius:6px;
  --mono:'JetBrains Mono', monospace;
  --sans:'Inter', -apple-system, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  line-height:1.5;
}
.app{display:flex; min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:236px; flex-shrink:0; background:var(--panel);
  border-right:1px solid var(--border-soft);
  display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh;
}
.brand{
  padding:20px 18px 16px; border-bottom:1px solid var(--border-soft);
}
.brand-name{font-family:var(--mono); font-weight:700; font-size:15px; letter-spacing:0.02em; color:var(--text);}
.brand-sub{font-size:11px; color:var(--muted-2); margin-top:3px; font-family:var(--mono); letter-spacing:0.04em; text-transform:uppercase;}
.nav{flex:1; padding:14px 10px; position:relative;}
.nav::before{
  content:''; position:absolute; left:24px; top:14px; bottom:14px; width:1px;
  background:linear-gradient(var(--border), var(--cyan-dim), var(--border));
  opacity:0.5;
}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px 9px 8px;
  border-radius:var(--radius); cursor:pointer; color:var(--muted);
  font-size:13px; position:relative; z-index:1; margin-bottom:2px;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--panel-2); color:var(--text);}
.nav-item.active{background:var(--panel-2); color:var(--cyan); border-color:var(--border);}
.nav-dot{width:7px; height:7px; border-radius:50%; background:var(--muted-2); flex-shrink:0; margin-left:9px;}
.nav-item.active .nav-dot{background:var(--cyan); box-shadow:0 0 0 3px var(--cyan-dim);}
.nav-label{font-weight:500; letter-spacing:0.01em;}
.nav-count{margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--muted-2); background:var(--bg); padding:1px 6px; border-radius:10px; border:1px solid var(--border-soft);}
.nav-item.active .nav-count{color:var(--cyan); border-color:var(--cyan-dim);}
.sidebar-foot{padding:14px 18px; border-top:1px solid var(--border-soft); font-size:11px; color:var(--muted-2); font-family:var(--mono);}

/* MAIN */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  padding:16px 32px; border-bottom:1px solid var(--border-soft);
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg, rgba(49,216,196,0.03), transparent);
  position:relative; z-index:20;
}
.topbar-title{font-family:var(--mono); font-size:17px; font-weight:600;}
.topbar-crumb{font-size:12px; color:var(--muted-2); margin-top:3px;}
.topbar-right{display:flex; align-items:center; gap:16px;}
.topbar-status{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); white-space:nowrap;}
.pulse{width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px var(--green-dim);}
.content{padding:26px 32px 60px; overflow-y:auto;}

/* Global search */
.gsearch-wrap{position:relative;}
.gsearch-input{
  width:320px; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
  padding:8px 12px; border-radius:var(--radius); font-size:12.5px; font-family:var(--sans);
}
.gsearch-input:focus{outline:none; border-color:var(--cyan);}
.gsearch-results{
  position:absolute; top:calc(100% + 6px); left:0; width:420px; max-height:400px; overflow-y:auto;
  background:var(--panel); border:1px solid var(--border); border-radius:8px; display:none;
  box-shadow:0 12px 32px rgba(0,0,0,0.4); z-index:30;
}
.gsearch-results.open{display:block;}
.gsearch-item{padding:10px 13px; border-bottom:1px solid var(--border-soft); cursor:pointer; display:flex; align-items:center; gap:10px;}
.gsearch-item:last-child{border-bottom:none;}
.gsearch-item:hover{background:var(--panel-2);}
.gsearch-type{font-family:var(--mono); font-size:9.5px; text-transform:uppercase; padding:2px 6px; border-radius:4px; background:var(--panel-2); color:var(--muted); border:1px solid var(--border); flex-shrink:0; width:64px; text-align:center;}
.gsearch-text{flex:1; min-width:0;}
.gsearch-title{font-size:12.5px;}
.gsearch-sub{font-size:11px; color:var(--muted-2); font-family:var(--mono); margin-top:1px;}
.gsearch-empty{padding:16px 13px; font-size:12px; color:var(--muted-2);}

/* Deltas */
.delta{font-family:var(--mono); font-size:11.5px; font-weight:600; margin-left:6px;}
.delta.up-good{color:var(--green);} .delta.up-bad{color:var(--red);}
.delta.down-good{color:var(--green);} .delta.down-bad{color:var(--red);}

/* Toasts */
.toast-stack{position:fixed; bottom:20px; right:20px; z-index:100; display:flex; flex-direction:column; gap:8px;}
.toast{
  background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--cyan);
  border-radius:6px; padding:10px 14px; font-size:12.5px; min-width:240px; max-width:340px;
  box-shadow:0 8px 24px rgba(0,0,0,0.4); animation:toastin .25s ease;
}
.toast.warn{border-left-color:var(--amber);}
.toast.crit{border-left-color:var(--red);}
@keyframes toastin{from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);}}


/* GENERIC */
.grid{display:grid; gap:14px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
.card{
  background:var(--panel); border:1px solid var(--border-soft); border-radius:10px;
  padding:16px 18px;
}
.metric-label{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; font-family:var(--mono);}
.metric-value{font-family:var(--mono); font-size:26px; font-weight:700; margin-top:8px;}
.metric-sub{font-size:12px; color:var(--muted-2); margin-top:4px;}
.metric-value.cyan{color:var(--cyan);}
.metric-value.amber{color:var(--amber);}
.metric-value.red{color:var(--red);}
.metric-value.green{color:var(--green);}

h2.section-title{font-size:14px; font-weight:600; margin:28px 0 12px; color:var(--text); display:flex; align-items:center; gap:8px;}
h2.section-title:first-child{margin-top:0;}
h2.section-title::before{content:''; width:3px; height:14px; background:var(--cyan); display:inline-block; border-radius:2px;}

table{width:100%; border-collapse:collapse; font-size:12.5px;}
thead th{
  text-align:left; padding:8px 12px; color:var(--muted); font-weight:500;
  border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:0.04em;
  font-family:var(--mono);
}
tbody td{padding:10px 12px; border-bottom:1px solid var(--border-soft); vertical-align:middle;}
tbody tr:hover{background:var(--panel-2);}
.mono{font-family:var(--mono); font-size:12px; color:var(--muted);}
.table-wrap{background:var(--panel); border:1px solid var(--border-soft); border-radius:10px; overflow:hidden;}

.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--mono); white-space:nowrap;}
.badge.b-red{background:var(--red-dim); color:var(--red);}
.badge.b-amber{background:var(--amber-dim); color:var(--amber);}
.badge.b-green{background:var(--green-dim); color:var(--green);}
.badge.b-cyan{background:var(--cyan-dim); color:var(--cyan);}
.badge.b-gray{background:var(--panel-2); color:var(--muted); border:1px solid var(--border);}
.badge-dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

.bar-track{height:6px; background:var(--panel-2); border-radius:4px; overflow:hidden; width:100%; border:1px solid var(--border-soft);}
.bar-fill{height:100%; border-radius:4px;}

.tab-panel{display:none;}
.tab-panel.active{display:block; animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.row-flex{display:flex; align-items:center; gap:8px;}
.desc{color:var(--muted); font-size:12.5px; margin-bottom:16px; max-width:760px;}

/* Traceability chain */
.chain-wrap{background:var(--panel); border:1px solid var(--border-soft); border-radius:10px; padding:26px 22px;}
.chain{display:flex; align-items:stretch; gap:0; overflow-x:auto; padding-bottom:6px;}
.chain-node{
  min-width:150px; background:var(--panel-2); border:1px solid var(--border); border-radius:8px;
  padding:12px 13px; position:relative; flex-shrink:0; cursor:pointer;
}
.chain-node:hover{border-color:var(--cyan);}
.chain-node.selected{border-color:var(--cyan); background:var(--cyan-dim);}
.chain-node .k{font-size:10px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted-2); font-family:var(--mono);}
.chain-node .v{font-size:12.5px; font-weight:600; margin-top:4px;}
.chain-node .m{font-size:11px; color:var(--muted); margin-top:3px; font-family:var(--mono);}
.chain-arrow{
  display:flex; align-items:center; justify-content:center; width:34px; flex-shrink:0; color:var(--muted-2);
  font-family:var(--mono); font-size:14px;
}
.chain-detail{margin-top:18px; padding-top:16px; border-top:1px solid var(--border-soft); font-size:12.5px; color:var(--muted);}

/* Compliance */
.clause-row{padding:14px 0; border-bottom:1px solid var(--border-soft);}
.clause-row:last-child{border-bottom:none;}
.clause-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
.clause-name{font-size:13px; font-weight:500;}
.clause-id{font-family:var(--mono); font-size:11px; color:var(--muted-2);}
.clause-pct{font-family:var(--mono); font-size:12.5px; font-weight:600;}

/* Quantum module */
.qm-banner{
  background:linear-gradient(135deg, rgba(49,216,196,0.08), rgba(49,216,196,0.02));
  border:1px solid var(--cyan-dim); border-radius:10px; padding:14px 18px; margin-bottom:18px;
  font-size:12.5px; color:var(--muted); display:flex; gap:10px; align-items:flex-start;
}
.qm-banner .tag{background:var(--cyan-dim); color:var(--cyan); font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:4px; flex-shrink:0; margin-top:1px;}

/* buttons/inputs */
input[type=text]{
  background:var(--panel-2); border:1px solid var(--border); color:var(--text);
  padding:8px 12px; border-radius:var(--radius); font-size:12.5px; font-family:var(--sans);
  width:240px;
}
input[type=text]:focus{outline:1px solid var(--cyan); border-color:var(--cyan);}
.toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
.filter-chips{display:flex; gap:6px;}
.chip{padding:5px 11px; border-radius:20px; font-size:11.5px; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-family:var(--mono);}
.chip.active{background:var(--cyan-dim); color:var(--cyan); border-color:var(--cyan-dim);}

::-webkit-scrollbar{height:8px; width:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

.evidence-item{display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid var(--border-soft);}
.evidence-item:last-child{border-bottom:none;}
.evidence-icon{width:32px; height:32px; border-radius:6px; background:var(--panel-2); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:10px; color:var(--cyan); flex-shrink:0; border:1px solid var(--border);}
.evidence-meta{flex:1; min-width:0;}
.evidence-name{font-size:12.5px; font-weight:500;}
.evidence-sub{font-size:11px; color:var(--muted-2); font-family:var(--mono); margin-top:2px;}

.upload-zone{
  border:1.5px dashed var(--border); border-radius:10px; padding:26px; text-align:center;
  margin-bottom:16px; cursor:pointer; transition:all .15s ease;
}
.upload-zone:hover, .upload-zone.drag{border-color:var(--cyan); background:rgba(49,216,196,0.04);}
.upload-icon{font-family:var(--mono); font-size:18px; color:var(--cyan); margin-bottom:6px;}
.upload-text{font-size:12.5px;}
.upload-link{color:var(--cyan); text-decoration:underline;}
.upload-sub{font-size:11px; color:var(--muted-2); margin-top:6px;}

/* Activity / notifications */
.notif-item{display:flex; gap:12px; padding:12px 14px; border-bottom:1px solid var(--border-soft); align-items:flex-start;}
.notif-item:last-child{border-bottom:none;}
.notif-dot{width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0;}
.notif-body{flex:1; min-width:0; font-size:12.5px;}
.notif-time{font-size:11px; color:var(--muted-2); font-family:var(--mono); white-space:nowrap;}
.log-row{display:flex; gap:14px; padding:9px 14px; border-bottom:1px solid var(--border-soft); font-size:12px; align-items:center;}
.log-row:last-child{border-bottom:none;}
.log-time{font-family:var(--mono); color:var(--muted-2); width:130px; flex-shrink:0;}
.log-actor{color:var(--cyan); font-weight:500; width:150px; flex-shrink:0;}
.log-text{color:var(--muted); flex:1;}

/* Knowledge graph */
.graph-wrap{background:var(--panel); border:1px solid var(--border-soft); border-radius:10px; padding:18px; position:relative;}
.graph-legend{display:flex; gap:16px; flex-wrap:wrap; margin-bottom:14px; font-size:11.5px; color:var(--muted); font-family:var(--mono);}
.legend-item{display:flex; align-items:center; gap:6px;}
.legend-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
.gnode{cursor:pointer;}
.gnode circle{stroke-width:1.5; transition:all .15s ease;}
.gnode:hover circle{stroke-width:2.5;}
.gnode text{font-family:var(--sans); pointer-events:none;}
.gnode .glabel{font-size:9.5px; font-weight:600; fill:var(--text);}
.gnode .gsub{font-size:8px; fill:var(--muted-2);}
.gedge{stroke:var(--border); stroke-width:1.3; fill:none; opacity:0.55;}
.gedge.hi{stroke:var(--cyan); stroke-width:2; opacity:1;}
.graph-detail{margin-top:16px; padding-top:14px; border-top:1px solid var(--border-soft); font-size:12.5px; color:var(--muted); min-height:20px;}

/* AI assistant */
.assist-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start;}
textarea.assist-input{
  width:100%; min-height:260px; background:var(--panel-2); border:1px solid var(--border);
  color:var(--text); padding:12px 14px; border-radius:8px; font-size:12.5px; font-family:var(--mono);
  resize:vertical; line-height:1.5;
}
textarea.assist-input:focus{outline:1px solid var(--cyan); border-color:var(--cyan);}
.btn{
  background:var(--cyan-dim); color:var(--cyan); border:1px solid var(--cyan-dim);
  padding:9px 16px; border-radius:6px; font-size:12.5px; font-weight:600; font-family:var(--sans);
  cursor:pointer; display:inline-flex; align-items:center; gap:8px;
}
.btn:hover{background:var(--cyan); color:#04211d;}
.btn:disabled{opacity:0.5; cursor:not-allowed;}
.btn.secondary{background:var(--panel-2); color:var(--muted); border-color:var(--border);}
.btn.secondary:hover{background:var(--panel-2); color:var(--text); border-color:var(--cyan);}
.assist-toolbar{display:flex; gap:10px; margin-top:12px;}
.assist-result{margin-top:0;}
.assist-finding{background:var(--panel-2); border:1px solid var(--border-soft); border-radius:8px; padding:12px 14px; margin-bottom:10px;}
.assist-finding.gap{border-left:3px solid var(--red);}
.assist-finding.present{border-left:3px solid var(--green);}
.assist-finding-top{display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:5px;}
.assist-finding-title{font-size:12.5px; font-weight:600;}
.assist-finding-clause{font-family:var(--mono); font-size:10.5px; color:var(--muted-2);}
.assist-finding-desc{font-size:12px; color:var(--muted); line-height:1.5;}
.assist-spinner{width:13px; height:13px; border-radius:50%; border:2px solid var(--cyan-dim); border-top-color:var(--cyan); animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.assist-empty{color:var(--muted-2); font-size:12.5px; padding:40px 10px; text-align:center;}

@media (max-width: 900px){
  .assist-grid{grid-template-columns:1fr;}
  .g4{grid-template-columns:repeat(2,1fr);}
  .g3{grid-template-columns:repeat(2,1fr);}
  .app{flex-direction:column;}
  .sidebar{width:100%; height:auto; position:relative; flex-direction:row; align-items:center; overflow-x:auto;}
  .brand{border-bottom:none; border-right:1px solid var(--border-soft); flex-shrink:0;}
  .nav{display:flex; flex:none; padding:10px;}
  .nav::before{display:none;}
  .nav-item{flex-shrink:0; white-space:nowrap;}
  .nav-dot{margin-left:0;}
  .sidebar-foot{display:none;}
  .content{padding:18px;}
}
</style>
</head>
<body>
<div class="app">

  <div class="sidebar">
    <div class="brand">
      <div class="brand-name">MERIDIAN</div>
      <div class="brand-sub">Cyber Governance Platform</div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-foot">ORG · Meridian Motors AG<br>PROGRAM · MY27 Platform<br>BUILT BY · Vaishnavi Dixit</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Overview</div>
        <div class="topbar-crumb" id="topbarCrumb">Cyber governance · MY27 program fleet</div>
      </div>
      <div class="topbar-right">
        <div class="gsearch-wrap">
          <input type="text" id="globalSearch" class="gsearch-input" placeholder="Search vehicles, CVEs, firmware, suppliers…  ( / )" autocomplete="off">
          <div class="gsearch-results" id="gsearchResults"></div>
        </div>
        <div class="topbar-status"><span class="pulse" style="background:var(--amber); box-shadow:0 0 0 3px var(--amber-dim);"></span> Demo build · static dataset</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>

</div>

<div class="toast-stack" id="toastStack"></div>

<script>
/* ---------------------------- DATA ---------------------------- */

const modules = [
  {id:'overview', label:'Overview', count:null},
  {id:'fleet', label:'Fleet & ECUs', count:'842'},
  {id:'suppliers', label:'Suppliers', count:'23'},
  {id:'firmware', label:'Firmware provenance', count:'156'},
  {id:'trace', label:'Traceability', count:null},
  {id:'vulns', label:'Vulnerabilities', count:'17'},
  {id:'compliance', label:'Compliance', count:'78%'},
  {id:'evidence', label:'Audit evidence', count:'64'},
  {id:'activity', label:'Activity & audit log', count:null},
  {id:'graph', label:'Knowledge graph', count:null},
  {id:'assistant', label:'AI compliance assistant', count:'local'},
  {id:'architecture', label:'Architecture & scope', count:null},
  {id:'quantum', label:'Quantum anomaly detection', count:'beta'},

const suppliers = [
  {name:'Aveon Semiconductor', tier:'Tier 1', cat:'Telematics SoC', risk:18, cert:['ISO/SAE 21434','TISAX AL3'], lastAudit:'2026-04-12', sla:'6h'},
  {name:'Rihelm Systems', tier:'Tier 1', cat:'ADAS domain controller', risk:34, cert:['ISO/SAE 21434'], lastAudit:'2026-02-28', sla:'18h'},
  {name:'Norvex Braking', tier:'Tier 1', cat:'Brake ECU', risk:12, cert:['ISO/SAE 21434','ISO 26262','TISAX AL3'], lastAudit:'2026-05-30', sla:'4h'},
  {name:'Ondura Connect', tier:'Tier 2', cat:'Cellular modem', risk:57, cert:['TISAX AL2'], lastAudit:'2025-11-02', sla:'40h'},
  {name:'Kestrel Optics', tier:'Tier 2', cat:'Camera module', risk:29, cert:['ISO/SAE 21434'], lastAudit:'2026-03-19', sla:'12h'},
  {name:'Palisade Firmware Labs', tier:'Tier 3', cat:'Bootloader vendor', risk:71, cert:['—'], lastAudit:'2024-09-14', sla:'96h'},
  {name:'Solenne Actuation', tier:'Tier 1', cat:'Steering ECU', risk:21, cert:['ISO/SAE 21434','ISO 26262'], lastAudit:'2026-06-01', sla:'8h'},
];

function setTop(title, crumb){
  document.getElementById('topbarTitle').textContent = title;

function bar(pct, color){
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color};"></div></div>`;
}
function riskColor(r){ return r<25?'var(--green)': r<55?'var(--amber)':'var(--red)'; }
function pctColor(p){ return p>=85?'var(--green)': p>=65?'var(--amber)':'var(--red)'; }

function renderContent(){
  const c = document.getElementById('content');
  if(active==='overview') return renderOverview(c);
  if(active==='fleet') return renderFleet(c);
  if(active==='suppliers') return renderSuppliers(c);
  if(active==='firmware') return renderFirmware(c);
  if(active==='trace') return renderTrace(c);

  if(active==='compliance') return renderCompliance(c);
  if(active==='evidence') return renderEvidence(c);
  if(active==='graph') return renderGraph(c);
  if(active==='assistant') return renderAssistant(c);

function riskHistogram(){
  const buckets = [{label:'0-25 low',min:0,max:25},{label:'25-50 moderate',min:25,max:50},{label:'50-75 elevated',min:50,max:75},{label:'75-100 high',min:75,max:100}];
  const counts = buckets.map(b=>({...b, n: suppliers.filter(s=>s.risk>=b.min && s.risk<b.max).length}));
  const max = Math.max(...counts.map(c=>c.n),1);
  const col = b => b.min>=75?'var(--red)':b.min>=50?'var(--amber)':b.min>=25?'var(--cyan)':'var(--green)';
  return `
  <div style="display:flex; align-items:flex-end; gap:22px; height:110px; padding:6px 4px;">
    ${counts.map(b=>`
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;">
        <div class="mono" style="font-size:12px; color:${col(b)};">${b.n}</div>
        <div style="width:100%; max-width:64px; height:${Math.max((b.n/max)*76,4)}px; background:${col(b)}; border-radius:4px 4px 0 0; opacity:0.85;"></div>
        <div class="mono" style="font-size:10px; color:var(--muted-2); text-align:center;">${b.label}</div>
      </div>`).join('')}

}

      <div class="v">${s.v}</div>
      <div class="m">${s.m}</div>
    </div>`).join('');
  wrap.querySelectorAll('.chain-node').forEach(el=>el.addEventListener('click', ()=>{
    selectedChain = parseInt(el.dataset.i); drawChain();
  }));
  const details = [

function trendChart(data){
  const w=760,h=140,pad=28;
  const max=100, min=40;
  const step=(w-pad*2)/(data.length-1);
  const y = v => h-pad-((v-min)/(max-min))*(h-pad*2);
  const path = data.map((d,i)=>`${i===0?'M':'L'} ${pad+i*step} ${y(d.pct)}`).join(' ');
  const area = path + ` L ${pad+(data.length-1)*step} ${h-pad} L ${pad} ${h-pad} Z`;
  return `
  <svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block;">
    <path d="${area}" fill="var(--cyan)" opacity="0.08"/>
    <path d="${path}" fill="none" stroke="var(--cyan)" stroke-width="2"/>
    ${data.map((d,i)=>`<circle cx="${pad+i*step}" cy="${y(d.pct)}" r="3.5" fill="var(--bg)" stroke="var(--cyan)" stroke-width="2"/>`).join('')}
    ${data.map((d,i)=>`<text x="${pad+i*step}" y="${h-6}" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="#8CA0BE">${d.m}</text>`).join('')}

}

/* Local heuristic evidence-category scanner — no network calls, works when
   this file is hosted anywhere (GitHub Pages, a static site, etc). It looks
   for keyword signals per required evidence category and reports coverage
   the way a first-pass compliance triage would, before a human reviews it. */
const assistCategories = [
  {category:'CSMS certification', clause:'UN R155 §7.2', keys:['csms','certified','certification'],
    present:'A Cybersecurity Management System certification reference was found in the document.',
    gap:'No CSMS certification reference found — required for UN R155 type approval.'},

    gap:'No SBOM reference found — needed to trace component-level vulnerabilities to deployed firmware.'},

    present:'Supplier cybersecurity requirements appear to be referenced in contractual terms.',
    gap:'No mention of supplier cybersecurity requirements or flow-down contract terms.'},

  {category:'Software Update Management System (SUMS)', clause:'UN R156 §7.1', keys:['sums','software update management','ota','over-the-air'],
    present:'A software update management process (SUMS/OTA) reference was found.',
    gap:'No SUMS / OTA update management process referenced — required under UN R156.'},
  {category:'Update rollback & traceability evidence', clause:'UN R156 Annex 4', keys:['rollback','traceability','update campaign','version history'],
    present:'Rollback or update traceability evidence was referenced.',
    gap:'No rollback or update-traceability evidence found for deployed campaigns.'},
];
function scanAssistDoc(input){
  const lower = input.toLowerCase();
  const findings = assistCategories.map(c=>{
    const hit = c.keys.some(k=>lower.includes(k));
    return {category:c.category, clause:c.clause, status:hit?'present':'gap', note:hit?c.present:c.gap};
  });
  findings.sort((a,b)=> (a.status==='gap'?0:1) - (b.status==='gap'?0:1));
  return findings;
}

function seededRandom(seed){
  let s = seed % 2147483647; if(s<=0) s += 2147483646;
  return function(){ s = (s*16807) % 2147483647; return (s-1)/2147483646; };
}

    if(i===19||i===20) base += 0.55;
    if(i===37) base += 0.38;
    points.push(Math.max(0, base));

  const w=760,h=200,pad=24;

  </div>

  <h2 class="section-title">Audit log</h2>
  <div class="table-wrap" id="auditLogWrap"></div>
  `;
  drawLog();
}
function drawLog(){
  const wrap = document.getElementById('auditLogWrap');
  if(!wrap) return;
  wrap.innerHTML = activityLog.map(a=>`
    <div class="log-row">
      <div class="log-time">${a.time}</div>
      <div class="log-actor">${a.actor}</div>
      <div class="log-text">${a.text}</div>
    </div>`).join('');
}

/* ---------------------------- GLOBAL SEARCH ---------------------------- */
function buildSearchIndex(){
  const idx = [];
  fleet.forEach(f=> idx.push({type:'Vehicle', title:f.vin, sub:`${f.model} · ${f.ecu}`, goto:'fleet'}));
  suppliers.forEach(s=> idx.push({type:'Supplier', title:s.name, sub:s.cat, goto:'suppliers'}));
  firmware.forEach(f=> idx.push({type:'Firmware', title:f.id, sub:`${f.ecu} · ${f.ver}`, goto:'firmware'}));
  vulns.forEach(v=> idx.push({type:'Vulnerability', title:v.id, sub:`${v.cve} · ${v.comp}`, goto:'vulns'}));
  evidence.forEach(e=> idx.push({type:'Evidence', title:e.name, sub:e.linked, goto:'evidence'}));
  return idx;
}
const searchIndex = buildSearchIndex();
function initGlobalSearch(){
  const input = document.getElementById('globalSearch');
  const results = document.getElementById('gsearchResults');
  if(!input) return;
  function draw(q){
    if(!q){ results.classList.remove('open'); results.innerHTML=''; return; }
    const ql = q.toLowerCase();
    const matches = searchIndex.filter(i => (i.title+i.sub).toLowerCase().includes(ql)).slice(0,10);
    results.innerHTML = matches.length ? matches.map(m=>`
      <div class="gsearch-item" data-goto="${m.goto}">
        <span class="gsearch-type">${m.type}</span>
        <div class="gsearch-text"><div class="gsearch-title">${m.title}</div><div class="gsearch-sub">${m.sub}</div></div>
      </div>`).join('') : `<div class="gsearch-empty">No matches for "${q}"</div>`;
    results.classList.add('open');
    results.querySelectorAll('.gsearch-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        active = el.dataset.goto; renderNav(); renderContent();
        results.classList.remove('open'); input.value=''; input.blur();
      });
    });
  }
  input.addEventListener('input', e=> draw(e.target.value.trim()));
  input.addEventListener('focus', e=> { if(e.target.value.trim()) draw(e.target.value.trim()); });
  document.addEventListener('click', e=>{ if(!e.target.closest('.gsearch-wrap')) results.classList.remove('open'); });
  document.addEventListener('keydown', e=>{
    if(e.key==='/' && document.activeElement !== input){ e.preventDefault(); input.focus(); }
    if(e.key==='Escape'){ results.classList.remove('open'); input.blur(); }
  });
}

/* ---------------------------- INIT ---------------------------- */
renderNav();
renderContent();
initGlobalSearch();
